{% extends "tracker/layout.html" %}
{% block content %}
<article class="media content-section d-flex align-items-start">
  <img class = "rounded-circle article-img mr-3" src = "{{  object.author.profile.image.url  }}">
  <div class="media-body">
      <div class="article-metadata">
          <a class="mr-2" href="#">{{ object.author }}</a>
          <small class="text-muted">{{ object.date_posted|date:"F d, Y" }}</small>
      </div>
      <h2 class="article-title">Day _ of {{ object.author.profile.medication }}</h2>
      <h4 class="article-content">{{ object.title }}</h3>

      <p class="article-content">{{ object.content }}</p>
  </div>
</article>
{% endblock content %}
